<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <style>
        body { padding-top: 2rem; background-color: #f8f9fa; }
        .status-text { font-weight: bold; font-family: monospace; }
    </style>
    <script>
        // Setup Server-Sent Events for real-time updates
        const evtSource = new EventSource("/stream/hardware");

        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            $("#reed_status_closed_door").text(data.reed_closed);
            $("#reed_status_open_door").text(data.reed_open);
            
            // Update timestamp or relay status if needed
            if(data.relay !== 'Klaar voor actie' && data.relay !== 'Verbonden') {
                 $("#relay_status").text(data.relay);
            }
        };

        $(function() {
            $("#toggle_relay").click(function (event) {
                $("#relay_status").text("Schakelen...");
                toggle_relay();
            });
        });

        function toggle_relay() {
            $.ajax({
               url: '/relay/toggle',
               type: 'PUT',
               success: function(response) {
                   $("#relay_status").text('Toggled (Actie uitgevoerd)');
                   // De stream zal kort hierna de status updaten
               }
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>🛠️ Hardware Test</h1>
            <a href="/" class="btn btn-secondary">Terug naar Home</a>
        </div>

        <div class="row g-4">
            <!-- Relay Card -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">Relais (Motor)</h5>
                    </div>
                    <div class="card-body text-center">
                        <p class="card-text">Laatste actie:</p>
                        <p class="status-text text-primary" id="relay_status">Wachten...</p>
                        <button id="toggle_relay" class="btn btn-danger w-100 mt-3">Schakel Relais</button>
                    </div>
                </div>
            </div>

            <!-- Reed Closed Card -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="card-title mb-0">Sensor: Dicht</h5>
                    </div>
                    <div class="card-body text-center">
                        <p class="card-text">Huidige status:</p>
                        <p class="status-text text-success" id="reed_status_closed_door">Laden...</p>
                    </div>
                </div>
            </div>

            <!-- Reed Open Card -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="card-title mb-0">Sensor: Open</h5>
                    </div>
                    <div class="card-body text-center">
                        <p class="card-text">Huidige status:</p>
                        <p class="status-text text-warning" id="reed_status_open_door">Laden...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
